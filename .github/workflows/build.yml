#==========================================================================
# 用途：基于【已有 rootfs tar.gz】构建 panther-x2 (RK3566) 镜像
# rebuild 工具链已内置仓库，完全独立，不依赖外部 ophub 仓库
#==========================================================================
name: Build Debian for panther-x2 (Reuse Rootfs)

on:
  workflow_dispatch:
    inputs:
      rootfs_url:
        description: "已有 rootfs tar.gz 的下载地址 (必填)"
        required: true
        default: ""
      debian_release:
        description: "镜像版本标识 (用于 Release 命名)"
        required: false
        default: "bookworm"
        type: choice
        options:
          - bookworm
          - trixie
      armbian_kernel:
        description: "内核版本"
        required: false
        default: "rk35xx/6.1.y"
        type: choice
        options:
          - 6.12.y
          - rk35xx/6.1.y
      armbian_fstype:
        description: "rootfs 文件系统类型"
        required: false
        default: "ext4"
        type: choice
        options:
          - ext4
          - btrfs
      builder_name:
        description: "构建者签名"
        required: false
        default: "mybuilder"

env:
  TZ: UTC
  ROOTFS_DIR: /builder/debian-rootfs
  BOARD: panther-x2

jobs:
  build:
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. 初始化环境 ──────────────────────────────────────────────────
      - name: Initialize environment
        id: init
        run: |
          sudo -E apt-get -y update
          sudo -E apt-get -y install \
            parted e2fsprogs dosfstools btrfs-progs \
            u-boot-tools uuid-runtime openssl pigz \
            git curl wget xz-utils lz4 zstd pv jq rsync
          echo "status=success" >> "${GITHUB_OUTPUT}"

      # ── 2. 合并磁盘空间 (LVM 扩容以容纳大镜像) ─────────────────────────
      - name: Create build disk
        if: ${{ steps.init.outputs.status == 'success' }}
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}G" /mnt/mnt.img
          sudo truncate -s "${root_size}G" /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6 /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder

      # ── 3. 下载并解压已有 Rootfs ──────────────────────────────────────
      - name: Prepare Existing Rootfs
        id: rootfs
        run: |
          set -euo pipefail
          ROOTFS_URL="${{ inputs.rootfs_url }}"
          [[ -z "${ROOTFS_URL}" ]] && { echo "错误：未提供 rootfs_url"; exit 1; }

          sudo mkdir -p "${ROOTFS_DIR}"
          echo "▶ 正在下载 rootfs: ${ROOTFS_URL}"
          wget -q --show-progress -O /tmp/rootfs.tar.gz "${ROOTFS_URL}"

          echo "▶ 正在解压..."
          sudo tar -xf /tmp/rootfs.tar.gz -C "${ROOTFS_DIR}"
          rm -f /tmp/rootfs.tar.gz

          [[ -d "${ROOTFS_DIR}/etc" ]] || { echo "::error::rootfs 结构非法，缺少 /etc 目录"; exit 1; }
          echo "▶ 解压完成，占用空间: $(sudo du -sh ${ROOTFS_DIR} | awk '{print $1}')"
          echo "status=success" >> "${GITHUB_OUTPUT}"

      # ── 4. 将 Rootfs 写入标准 Armbian img (供 rebuild 消费) ───────────
      - name: Pack rootfs into Armbian-format image
        id: pack
        if: ${{ steps.rootfs.outputs.status == 'success' }}
        run: |
          set -euo pipefail

          REBUILD_DIR="${GITHUB_WORKSPACE}/rebuild"
          IMG_DIR="${REBUILD_DIR}/build/output/images"
          mkdir -p "${IMG_DIR}"

          # 文件名必须匹配 rebuild 脚本的查找模式: *-trunk_*.img
          IMG_NAME="Armbian_22.02.0-trunk_${{ inputs.debian_release }}_arm64.img"
          IMG_PATH="${IMG_DIR}/${IMG_NAME}"

          # 计算 rootfs 实际大小，留 512M 余量
          ROOTFS_MB=$(sudo du -sm "${ROOTFS_DIR}" | awk '{print $1}')
          IMG_MB=$((ROOTFS_MB + 768))   # bootfs 256M + rootfs 余量 512M
          echo "▶ rootfs 大小: ${ROOTFS_MB}M → 镜像总大小: ${IMG_MB}M"

          sudo fallocate -l "${IMG_MB}M" "${IMG_PATH}"

          # 标准 Armbian 分区布局: p1=bootfs(fat32,256M) p2=rootfs(ext4,剩余)
          sudo parted -s "${IMG_PATH}" mklabel gpt
          sudo parted -s "${IMG_PATH}" mkpart primary fat32  16MiB  272MiB
          sudo parted -s "${IMG_PATH}" mkpart primary ext4  272MiB  100%

          LOOP=$(sudo losetup --find --show --partscan "${IMG_PATH}")
          echo "▶ loop device: ${LOOP}"

          sudo mkfs.vfat -F 32 -n BOOT "${LOOP}p1"
          sudo mkfs.ext4 -F -L rootfs "${LOOP}p2"

          MNT_ROOT=$(mktemp -d)
          MNT_BOOT=$(mktemp -d)
          sudo mount "${LOOP}p2" "${MNT_ROOT}"
          sudo mount "${LOOP}p1" "${MNT_BOOT}"

          echo "▶ 正在写入 rootfs..."
          sudo rsync -a --info=progress2 "${ROOTFS_DIR}/" "${MNT_ROOT}/"

          # 写入基础 fstab（rebuild 会覆盖，这里仅保证镜像可挂载）
          BOOT_UUID=$(sudo blkid -s UUID -o value "${LOOP}p1")
          ROOT_UUID=$(sudo blkid -s UUID -o value "${LOOP}p2")
          sudo bash -c "cat > ${MNT_ROOT}/etc/fstab" << EOF
          UUID=${ROOT_UUID}  /       ext4  defaults,noatime  0 1
          UUID=${BOOT_UUID}  /boot   vfat  defaults          0 2
          tmpfs              /tmp    tmpfs defaults,nosuid    0 0
          EOF

          sudo umount "${MNT_BOOT}"
          sudo umount "${MNT_ROOT}"
          sudo losetup -d "${LOOP}"
          rmdir "${MNT_ROOT}" "${MNT_BOOT}"

          echo "▶ 镜像写入完成: ${IMG_PATH}"
          echo "img_path=${IMG_PATH}" >> "${GITHUB_OUTPUT}"
          echo "img_outdir=${IMG_DIR}" >> "${GITHUB_OUTPUT}"
          echo "status=success" >> "${GITHUB_OUTPUT}"

      # ── 5. Rebuild：注入 RK3566 内核 + 引导 ─────────────────────────
      - name: Rebuild image (inject kernel & bootloader)
        id: rebuild
        if: ${{ steps.pack.outputs.status == 'success' }}
        env:
          KERNEL: ${{ inputs.armbian_kernel }}
          FSTYPE: ${{ inputs.armbian_fstype }}
          BUILDER: ${{ inputs.builder_name }}
        run: |
          set -euo pipefail
          REBUILD_DIR="${GITHUB_WORKSPACE}/rebuild"
          sudo chmod +x "${REBUILD_DIR}/rebuild"
          cd "${REBUILD_DIR}"

          KERNEL_VER="${KERNEL##*/}"
          echo "▶ 执行: sudo ./rebuild -b ${BOARD} -a true -t ${FSTYPE} -s 256/1024 -r ophub/kernel -u stable -k 6.12.78"
          sudo ./rebuild \
            -b ${BOARD} \
            -a true \
            -t ${FSTYPE} \
            -s 256/1024 \
            -r ophub/kernel \
            -u rk35xx \
            -k ${KERNEL_VER} \
            -n ${BUILDER}

          echo "PACKAGED_OUTPUTPATH=${{ steps.pack.outputs.img_outdir }}" >> "${GITHUB_ENV}"
          echo "PACKAGED_STATUS=success" >> "${GITHUB_ENV}"

      # ── 6. 发布 Release ──────────────────────────────────────────────
      - name: Upload to Release
        uses: ncipollo/release-action@main
        if: ${{ env.PACKAGED_STATUS == 'success' }}
        with:
          tag: "Debian_${{ inputs.debian_release }}_${{ github.run_number }}"
          name: "Debian ${{ inputs.debian_release }} · ${{ inputs.armbian_kernel }}"
          artifacts: "${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz*"
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## 基于已有 Rootfs 构建
            - **来源 URL**: `${{ inputs.rootfs_url }}`
            - **内核**: `${{ inputs.armbian_kernel }}`
            - **文件系统**: `${{ inputs.armbian_fstype }}`
